name: Build OnePlus 9 Pro Stock Kernel

on:
  workflow_dispatch:

env:
  KERNEL_REPO: smualemi/android_kernel_oneplus_sm8350
  KERNEL_BRANCH: oneplus/sm8350_u_14.0.0_oneplus9
  DEVICE_TREE_REPO: smualemi/android_kernel_modules_and_devicetree_oneplus_sm8350
  DEVICE_TREE_BRANCH: oneplus/sm8350_u_14.0.0_oneplus9
  DEFCONFIG: ossi_oos14_defconfig
  DEVICE_CODENAME: lemonadep
  KERNEL_IMAGE: Image

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:

    - name: Checkout build scripts
      uses: actions/checkout@v4

    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        repository: ${{ env.KERNEL_REPO }}
        ref: ${{ env.KERNEL_BRANCH }}
        path: kernel/msm-5.4
        fetch-depth: 1

    - name: Checkout device tree
      uses: actions/checkout@v4
      with:
        repository: ${{ env.DEVICE_TREE_REPO }}
        ref: ${{ env.DEVICE_TREE_BRANCH }}
        path: kernel_modules_devicetree
        fetch-depth: 1

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
        bc bison build-essential ccache curl flex git \
        gperf libncurses-dev libssl-dev libelf-dev \
        python3 zip rsync cpio lz4

    - name: Clone Toolchains
      run: |

        git clone https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
        -b android11-release --depth=1 toolchain/clang

        git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 \
        --depth=1 toolchain/gcc-aarch64

        git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 \
        --depth=1 toolchain/gcc-arm32

        git clone https://android.googlesource.com/kernel/build \
        --depth=1 build

    - name: Prepare workspace
      run: |

        mkdir -p device
        mkdir -p vendor

        rsync -a kernel_modules_devicetree/device/ device/
        rsync -a kernel_modules_devicetree/vendor/ vendor/

    - name: Setup toolchain path
      run: |

        CLANG_DIR=$GITHUB_WORKSPACE/toolchain/clang/clang-r383902b

        echo "PATH=$CLANG_DIR/bin:$GITHUB_WORKSPACE/toolchain/gcc-aarch64/bin:$GITHUB_WORKSPACE/toolchain/gcc-arm32/bin:$PATH" >> $GITHUB_ENV

    - name: Build Kernel
      run: |

        export ARCH=arm64
        export SUBARCH=arm64

        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-android-
        export CROSS_COMPILE_COMPAT=arm-linux-androideabi-

        export CC=clang
        export LLVM=1
        export LLVM_IAS=1

        cd kernel/msm-5.4

        make O=out ARCH=arm64 ${{ env.DEFCONFIG }}

        make -j$(nproc) \
        O=out \
        ARCH=arm64 \
        CC=clang \
        LLVM=1 \
        LLVM_IAS=1

    - name: Verify kernel
      run: |

        file kernel/msm-5.4/out/arch/arm64/boot/Image

        strings kernel/msm-5.4/out/arch/arm64/boot/Image | grep qgki || true

    - name: Package kernel
      run: |

        git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3

        cp kernel/msm-5.4/out/arch/arm64/boot/Image AnyKernel3/

        cd AnyKernel3

        zip -r9 ../OP9Pro-Kernel.zip *

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: kernel
        path: OP9Pro-Kernel.zip
